{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Welcome{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/home.css' %}">
</head>
<body>
  <header class="site-header">
    <a class="welcome-title welcome-title--link" href="{% url 'welcome' %}">Welcome</a>
    <nav class="site-nav" aria-label="Primary">
      <a class="nav-pill nav-pill--cream" href="{% url 'planning' %}">Planning</a>
      <a class="nav-pill nav-pill--amber" href="#">Time table</a>
      <a class="nav-pill nav-pill--forest" href="#">Feed back</a>
    </nav>
  </header>

  {% block content %}{% endblock %}

  <footer class="site-footer">
    <span class="footer-star" aria-hidden="true">✦</span>
  </footer>
</body>
</html>
